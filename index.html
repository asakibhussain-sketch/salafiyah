<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Salafiyah - Find Peace. Stay Connected.</title>
    <meta name="description" content="Salafiyah: Your all-in-one companion for a stronger connection with Allah.">
    <meta name="theme-color" content="#006994">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="light-theme">
    <script>
        (() => {
            const storedTheme = localStorage.getItem('app_theme') || localStorage.getItem('theme') || 'light';
            const themeClass = storedTheme === 'dark' || storedTheme === 'light' ? `${storedTheme}-theme` : storedTheme;
            document.body.className = themeClass;
            document.documentElement.dataset.theme = storedTheme;
        })();
    </script>

    <div id="app-root">

        <!-- ===== Desktop Sidebar ===== -->
        <aside class="desktop-sidebar desktop-only">
        <div class="sidebar-logo" style="margin-bottom: 3rem; display: flex; align-items: center; gap: 0.75rem;">
            <div class="sidebar-logo-icon" style="background: none; border-radius: 0; display: flex; align-items: center; justify-content: center;">
                <img src="icon.png" alt="Salafiyah Logo" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <div style="flex-grow: 1;">
                <div style="display: flex; align-items: center; gap: 0.4rem;">
                    <h1 class="serif" style="font-size: 1.25rem; margin: 0; color: var(--primary-blue);">Salafiyah</h1>
                    <button onclick="window.app.toggleAboutModal()" style="background: none; border: none; padding: 2px; cursor: pointer; color: var(--text-muted); display: inline-flex; align-items: center; justify-content: center; transition: color 0.2s;" title="About Salafiyah">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    </button>
                </div>
                <p style="font-size: 0.65rem; color: var(--text-muted); margin: 0; letter-spacing: 0.05em;">Stay Connected</p>
            </div>
        </div>

        <nav id="desktop-nav" style="flex: 1;">
            <div class="nav-item active" data-screen="dashboard" onclick="window.app.loadScreen('dashboard')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                <span>Home</span>
            </div>
            <div class="nav-item" data-screen="quran" onclick="window.app.loadScreen('quran')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                <span>Quran</span>
            </div>
            <div class="nav-item" data-screen="mushaf" onclick="window.app.loadScreen('mushaf')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6V2m0 20v-4m0-4v-4m0 0H8m4 0h4"></path><path d="M12 12L8 8m4 4l4-4m-4 4l-4 4m4-4l4 4"></path></svg>
                <span>Mushaf</span>
            </div>
            <div class="nav-item" data-screen="tasbih" onclick="window.app.loadScreen('tasbih')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg>
                <span>Dhikr</span>
            </div>
            <div class="nav-item" data-screen="ask" onclick="window.app.loadScreen('ask')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span>Ask Imam</span>
            </div>
            <div class="nav-item" data-screen="toolkit" onclick="window.app.loadScreen('toolkit')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                <span>Toolkit</span>
            </div>
            <div class="nav-item" data-screen="tracker" onclick="window.app.loadScreen('tracker')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                <span>Insights</span>
            </div>
            <div class="nav-item" data-screen="duas" onclick="window.app.loadScreen('duas')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a3 3 0 0 0-3-3H5a3 3 0 0 0-3 3v8a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V8z"></path><path d="M10 12h4"></path><path d="M12 10v4"></path></svg>
                <span>Duas</span>
            </div>
        </nav>

        <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05);">
            <div id="current-date-sidebar" style="font-size: 0.72rem; color: var(--text-muted); margin-bottom: 2px;"></div>
            <div id="hijri-date-sidebar" style="font-size: 0.85rem; color: var(--primary-blue); font-weight: 800; margin-bottom: 1.5rem;"></div>
            <button class="btn-primary" style="width: 100%; justify-content: center; background: #6366f1; border: none; border-radius: 12px; height: 48px; font-weight: 700;" onclick="window.app.loadScreen('settings')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right: 0.5rem;"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Settings
            </button>
        </div>
    </aside>

        <!-- ===== Main App Area ===== -->
        <div id="app"
            style="flex-grow:1; display:flex; flex-direction:column; height:100dvh; overflow:hidden; position:relative;">

            <!-- Header -->
            <header>
                <!-- Mobile Logo -->
                <div class="logo-group mobile-only" style="display: flex; align-items: center; gap: 0.5rem;">
                    <img src="icon.png" alt="Salafiyah Logo" style="width: 32px; height: 32px; object-fit: contain;">
                    <div class="logo-text" style="display: flex; align-items: center; gap: 0.3rem;">
                        <h1 class="serif" style="font-size:1.2rem; margin:0; color:var(--primary-blue);">Salafiyah</h1>
                        <button onclick="window.app.toggleAboutModal()" style="background: none; border: none; padding: 2px; cursor: pointer; color: var(--text-muted); display: inline-flex; align-items: center; justify-content: center; transition: color 0.2s;" title="About Salafiyah">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Desktop Screen Title -->
                <h2 id="screen-title" class="serif desktop-only"
                    style="margin:0; font-size:1.4rem; color:var(--primary-blue);">Dashboard</h2>

                <div style="display:flex; gap:0.75rem; align-items:center; margin-left:auto;">
                    <!-- Profile / Auth Button -->
                    <button id="profile-btn" class="profile-circle" onclick="window.app.toggleAuth()"
                        title="Sign In / Profile">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </button>
                    <!-- Language Toggle -->
                    <button class="profile-circle" onclick="window.app.loadScreen('languages')" title="Select Language">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                        </svg>
                    </button>
                    <!-- Theme Toggle -->
                    <button class="profile-circle" onclick="window.app.toggleTheme()" title="Toggle Theme">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <path
                                d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42">
                            </path>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Main Content Area -->
            <main id="content-area" style="overflow-y:auto; flex-grow:1;">
                <div style="display:flex; align-items:center; justify-content:center; height:100%; opacity:0.5;">
                    <div class="loading-spinner" style="width:40px; height:40px;"></div>
                </div>
            </main>

            <!-- ===== Mobile Bottom Navigation ===== -->
            <nav class="bottom-nav mobile-only">
                <div class="nav-item active" data-screen="dashboard" onclick="window.app.loadScreen('dashboard')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22"
                        height="22">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    </svg>
                    <span>Home</span>
                </div>
                <div class="nav-item" data-screen="quran" onclick="window.app.loadScreen('quran')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22"
                        height="22">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    <span>Qur'an</span>
                </div>
                <div class="nav-item" data-screen="tasbih" onclick="window.app.loadScreen('tasbih')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22"
                        height="22">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 8v4l3 3"></path>
                    </svg>
                    <span>Dhikr</span>
                </div>
                <div class="nav-item" data-screen="duas" onclick="window.app.loadScreen('duas')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22"
                        height="22">
                        <path d="M18 8a3 3 0 0 0-3-3H5a3 3 0 0 0-3 3v8a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V8z"></path>
                        <path d="M10 12h4"></path>
                        <path d="M12 10v4"></path>
                    </svg>
                    <span>Duas</span>
                </div>
                <div class="nav-item" data-screen="toolkit" onclick="window.app.loadScreen('toolkit')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                    <span>Toolkit</span>
                </div>
                <div class="nav-item" data-screen="settings" onclick="window.app.loadScreen('settings')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22"
                        height="22">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>Profile</span>
                </div>
            </nav>
        </div>
    </div>

    <!-- ===== Persistent Audio Player ===== -->
    <div id="audio-player-container" class="audio-player-container audio-player-hidden"></div>

    <!-- Offline Audio Manager Overlay -->
    <div id="offline-audio-overlay" class="modal-overlay">
        <!-- Content remains the same -->
    </div>
    
    <!-- Recitation Intelligence Engine - Floating Side Panel -->
    <div id="recording-overlay" style="display: none; position: fixed; bottom: 100px; right: 16px; z-index: 10000; width: 270px;">
        <div class="glass-card" style="padding: 1rem 1.2rem; border-radius: 20px; position: relative; display: flex; flex-direction: column; gap: 0.7rem; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid var(--glass-border);">
            
            <!-- Header row (always visible) -->
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <span id="recording-indicator" style="display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #ff4757; opacity: 0.4; flex-shrink: 0; transition: all 0.3s;"></span>
                    <span style="font-size: 0.72rem; font-weight: 700; color: var(--accent-gold); letter-spacing: 0.06em;">SALAFIYAH AI</span>
                </div>
                <button onclick="window.app.closeRecordingModal()" style="background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-muted); line-height: 1; border-radius: 6px;">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- === RECORDING VIEW === -->
            <div id="recording-view">
                <!-- Timer + Status -->
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
                    <div id="recording-timer" style="font-size: 1.7rem; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; color: var(--text-primary);">00:00</div>
                    <div id="recording-status" style="font-size: 0.63rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); text-align: right; max-width: 90px; line-height: 1.3;">Ready</div>
                </div>

                <!-- Waveform Canvas -->
                <canvas id="recording-waveform" width="230" height="44" style="width: 100%; height: 44px; border-radius: 10px; background: rgba(0,0,0,0.1); margin-bottom: 0.4rem;"></canvas>

                <!-- Stop Button -->
                <button id="btn-record-stop" onclick="window.app.stopRecording()" style="width: 100%; padding: 0.55rem 1rem; border-radius: 50px; background: #ff4757; color: white; border: none; cursor: pointer; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.04em; display: flex; align-items: center; justify-content: center; gap: 0.4rem;">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                    Stop &amp; Analyze
                </button>
            </div>

            <!-- === RESULTS VIEW (hidden until done) === -->
            <div id="recording-results" style="display: none; flex-direction: column; gap: 0.6rem;">
                <!-- Grade badge -->
                <div style="text-align: center;">
                    <div id="result-grade-icon" style="font-size: 2rem; margin-bottom: 0.2rem;">✅</div>
                    <div id="result-grade-label" style="font-size: 1rem; font-weight: 800; color: #2ed573;">Excellent</div>
                    <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.15rem;">Recording Quality</div>
                </div>

                <!-- Stats row -->
                <div style="display: flex; gap: 0.5rem;">
                    <div style="flex: 1; background: var(--glass-bg); border-radius: 10px; padding: 0.5rem; text-align: center;">
                        <div id="result-duration" style="font-size: 0.95rem; font-weight: 700; color: var(--text-primary);">0s</div>
                        <div style="font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase;">Duration</div>
                    </div>
                    <div style="flex: 1; background: var(--glass-bg); border-radius: 10px; padding: 0.5rem; text-align: center;">
                        <div id="result-accuracy" style="font-size: 0.95rem; font-weight: 700; color: var(--accent-primary);">--%</div>
                        <div style="font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase;">Accuracy</div>
                    </div>
                    <div style="flex: 1; background: var(--glass-bg); border-radius: 10px; padding: 0.5rem; text-align: center;">
                        <div id="result-size" style="font-size: 0.95rem; font-weight: 700; color: var(--text-primary);">0 KB</div>
                        <div style="font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase;">Enhanced</div>
                    </div>
                </div>

                <!-- Status message -->
                <div id="result-message" style="font-size: 0.72rem; color: var(--text-secondary); text-align: center; line-height: 1.5; padding: 0.4rem 0.2rem;"></div>

                <!-- Done button -->
                <button onclick="window.app.closeRecordingModal()" style="width: 100%; padding: 0.55rem 1rem; border-radius: 50px; background: var(--accent-primary); color: white; border: none; cursor: pointer; font-size: 0.78rem; font-weight: 700;">
                    Done
                </button>
            </div>

        </div>
    </div>

    <!-- ===== Auth Modal ===== -->
    <div id="auth-modal" class="modal-overlay"
        style="display:none; position:fixed; inset:0; z-index:4000; align-items:center; justify-content:center; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);">
        <div
            style="background:#fff; border-radius:24px; padding:2.5rem; width:90%; max-width:400px; position:relative;">
            <button onclick="document.getElementById('auth-modal').style.display='none'"
                style="position:absolute; top:1rem; right:1rem; background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text-muted);">✕</button>
            <div id="auth-form-container"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="audio-engine.js"></script>
    <script src="prayer-engine.js"></script>
    <script src="main.js"></script>
    <script src="theme-system.js"></script>
    <script>
        // Initialize theme system when app loads
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => initThemeSystem(), 100);
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                // Tell a waiting SW to activate immediately
                const promptUpdate = worker => worker.postMessage({ type: 'SKIP_WAITING' });

                if (reg.waiting) promptUpdate(reg.waiting);

                reg.addEventListener('updatefound', () => {
                    const nw = reg.installing;
                    if (!nw) return;
                    nw.addEventListener('statechange', () => {
                        if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                            promptUpdate(nw);
                        }
                    });
                });

                // Reload once when the new SW takes control so fresh files are served
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (refreshing) return;
                    refreshing = true;
                    window.location.reload();
                });
            }).catch(() => {});
        }
    </script>
</body>

</html>
